name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: ソースコードを取得
        uses: actions/checkout@v4

      - name: 証明書とプロビジョニングプロファイルをセットアップ
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISION_PROFILE_BASE64: ${{ secrets.PROVISION_PROFILE_BASE64 }}
        run: |
          # p12証明書をデコードしてキーチェーンに登録
          echo "$P12_BASE64" > certificate.b64
          base64 -d -i certificate.b64 -o certificate.p12

          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

          # プロビジョニングプロファイルを配置
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISION_PROFILE_BASE64" > profile.b64
          base64 -d -i profile.b64 -o ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: IPAをビルド
        run: |
          xcodebuild archive \
            -workspace Stoat.xcworkspace \
            -scheme Stoat \
            -archivePath ./build/Stoat.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            -allowProvisioningUpdates

      - name: IPAを書き出し
        run: |
          mkdir -p ./build/ipa

          # exportOptions.plistを生成
          cat > ./build/exportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>teamID</key>
              <string>YOUR_TEAM_ID</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath ./build/Stoat.xcarchive \
            -exportPath ./build/ipa \
            -exportOptionsPlist ./build/exportOptions.plist

      - name: IPAをアップロード（ダウンロード用）
        uses: actions/upload-artifact@v4
        with:
          name: Stoat.ipa
          path: ./build/ipa/*.ipa

name: Build unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show available Xcode versions
        run: ls /Applications | grep Xcode

      - name: Show Xcode version in use
        run: xcodebuild -version

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Stoat.xcodeproj \
            -scheme Stoat

      - name: Build unsigned archive
        run: |
          xcodebuild clean archive \
            -project Stoat.xcodeproj \
            -scheme Stoat \
            -sdk iphoneos \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/Stoat.xcarchive" \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_STYLE=Manual \
            AD_HOC_CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""

      - name: Package into IPA
        run: |
          cd "$RUNNER_TEMP"
          mkdir -p Payload
          cp -r "Stoat.xcarchive/Products/Applications/Stoat.app" Payload/
          zip -r Stoat-unsigned.ipa Payload
          mkdir -p "$GITHUB_WORKSPACE/output"
          cp Stoat-unsigned.ipa "$GITHUB_WORKSPACE/output/"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Stoat-unsigned-ipa
          path: output/Stoat-unsigned.ipa
          retention-days: 7
